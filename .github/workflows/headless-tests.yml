name: headless-tests

on:
  pull_request:
  push:
    branches: [main]

jobs:
  headless-tests:
    runs-on: ubuntu-latest
    env:
      GODOT_VERSION: "4.2.2"
      GODOT_RELEASE: "stable"
    steps:
      - uses: actions/checkout@v4
      - name: Install Godot runtime
        run: |
          set -euo pipefail
          ARCHIVE="Godot_v${GODOT_VERSION}-${GODOT_RELEASE}_linux.x86_64.zip"
          DOWNLOAD_URL="https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-${GODOT_RELEASE}/${ARCHIVE}"
          curl -fL "$DOWNLOAD_URL" -o "/tmp/${ARCHIVE}"
          unzip -q "/tmp/${ARCHIVE}" -d /tmp
          chmod +x "/tmp/Godot_v${GODOT_VERSION}-${GODOT_RELEASE}_linux.x86_64"
          sudo mv "/tmp/Godot_v${GODOT_VERSION}-${GODOT_RELEASE}_linux.x86_64" /usr/local/bin/godot4
          godot4 --version
      - name: Run headless tests
        run: scripts/ci/headless_tests.sh
