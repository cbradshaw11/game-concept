id: TASK-314
title: Initialize poise_bar in CombatArena._ready()
type: bug
priority: p2
area: ui
risk: low
milestone: M3 Combat Model
status: done

problem: >
  hp_bar and stamina_bar are explicitly seeded in CombatArena._ready() from
  player values. poise_bar is not — it only updates when poise_changed fires.
  Currently works by coincidence (tscn default max_value=100 matches max_poise=100)
  but will display incorrect values if max_poise is ever tuned.
  Found by static verifier (WARN-3).

desired_outcome: >
  poise_bar.max_value and poise_bar.value are set in _ready() immediately after
  the player is assigned, matching the pattern used for hp_bar and stamina_bar.

scope_in:
  - Add poise_bar initialization in CombatArena._ready() after player assignment

scope_out:
  - Any other HUD changes

dependencies:
  blockers: []
  unblocks: []

acceptance_criteria:
