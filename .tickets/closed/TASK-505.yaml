notes: >
  Pause must only work during RUNNING and COMBAT states, not during IDLE, PREP,
  UPGRADE_DRAW, or CREDITS. Quit to Main Menu should call die_in_run() so that
  the 25% loot retention from TASK-506 applies. get_tree().paused = true prevents
  all _process and _physics_process from running, so the pause overlay itself
  must use process_mode = ALWAYS or be shown before pausing.
  Read the execution plan at .plans/TASK-505-execution-plan.md before implementing.
