id: TASK-505
title: Pause Menu and RunScreen Ring Display
type: feature
priority: p2
area: ui
risk: low
milestone: M5 Into the Dark
status: done

problem: >
  There is no pause menu. A player who needs to step away mid-run must force-quit,
  which loses run progress and reads as broken. The RunScreen also has no persistent
  display of which ring the player is currently in, making UI context ambiguous.

desired_outcome: >
  Escape key toggles a pause overlay during active run states only. Two buttons:
  Resume (resumes run) and Quit to Main Menu (calls die_in_run, returns to idle).
  Current ring label shown persistently on RunScreen, updated on run start.

scope_in:
  - PauseMenu overlay node in flow_ui.tscn (visible=false by default)
  - Escape key handler in flow_ui.gd (only during RUNNING/COMBAT states)
  - get_tree().paused = true/false on toggle
  - Resume button: hides overlay, unpauses
  - Quit to Main Menu: calls GameState.die_in_run(), transitions to idle
  - RingDisplay label node on RunScreen
  - Label updated on run_started signal with ring name
scope_out:
  - Settings menu or audio volume controls (M6)
  - Key rebinding (M6)
  - Save-on-quit (run state is not preserved across force-quit even with pause)

dependencies:
  blockers: []
  unblocks:
    - TASK-508

acceptance_criteria:
  - id: ac1
    description: Pause menu implementation present
    verify: "grep -n 'PauseMenu\\|pause_menu\\|KEY_ESCAPE\\|ui_cancel' game/scripts/ui/flow_ui.gd"
  - id: ac2
    description: Pause/unpause tree toggle present
    verify: "grep -n 'get_tree.*paused\\|tree.*pause' game/scripts/ui/flow_ui.gd"
  - id: ac3
    description: Ring display label present on RunScreen
    verify: "grep -n 'RingDisplay\\|ring_label\\|current_ring.*label\\|ring.*text' game/scripts/ui/flow_ui.gd"
  - id: ac4
    description: PauseMenu node in scene file
    verify: "grep -n 'PauseMenu\\|pause_menu' game/scenes/ui/flow_ui.tscn"

verification_required:
  - "grep -n 'PauseMenu\\|pause_menu\\|KEY_ESCAPE\\|ui_cancel' game/scripts/ui/flow_ui.gd"
  - "grep -n 'get_tree.*paused\\|tree.*pause' game/scripts/ui/flow_ui.gd"
  - "grep -n 'RingDisplay\\|ring_label' game/scripts/ui/flow_ui.gd"

