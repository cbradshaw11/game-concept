id: TASK-302
title: Enemy damage output
type: feature
priority: p1
area: combat
risk: high
milestone: M3 Combat Model
status: done

problem: >
  EnemyController.tick() transitions to ATTACK state but never deals damage to the
  player. _spawn_enemies uses hardcoded EnemyController.new(100, 3.5, 1.2) — no
  data from enemies.json. Enemies are harmless; threat does not exist.

desired_outcome: >
  Each enemy spawns with stats from enemies.json. When the ATTACK state resolves,
  the enemy calls combat_arena._apply_damage_to_player(enemy.damage). Different
  enemy types deal different amounts.

scope_in:
  - Add damage field to EnemyController (read from data at spawn time)
  - Update _spawn_enemies in CombatArena to read from DataStore.enemies using ring_id
  - Add attack cooldown to EnemyController so it doesn't deal damage every frame
  - Add _apply_damage_to_player(amount) to CombatArena that calls player.take_damage()
  - Wire ATTACK state resolution in CombatArena._process to call _apply_damage_to_player

scope_out:
  - Guard reduction modifier (TASK-304)
  - Dodge i-frame check (TASK-305)
  - Poise damage from enemies (TASK-306)
  - Ring 2/3 enemy types (out of scope for M3)

dependencies:
  blockers:
    - TASK-301
  unblocks:
    - TASK-304
    - TASK-305
    - TASK-306
    - TASK-308
    - TASK-309

acceptance_criteria:
  - id: ac1
    description: EnemyController has a damage field initialized from data
    verify: "grep -n 'var damage' game/scripts/core/enemy_controller.gd"
  - id: ac2
    description: _spawn_enemies reads from DataStore.enemies filtered by ring_id
    verify: "grep -n 'DataStore\\|enemies' game/scenes/combat/combat_arena.gd"
  - id: ac3
    description: CombatArena has _apply_damage_to_player method
    verify: "grep -n '_apply_damage_to_player' game/scenes/combat/combat_arena.gd"
  - id: ac4
    description: ATTACK state resolution calls _apply_damage_to_player with enemy.damage
    verify: "grep -n 'ATTACK\\|_apply_damage_to_player' game/scenes/combat/combat_arena.gd"
  - id: ac5
    description: Unit test — mock enemy with known damage, trigger attack, assert player HP reduced
    verify: "bash scripts/ci/headless_tests.sh 2>&1 | grep -E 'PASS.*enemy_damage|enemy_damage.*PASS'"

verification_required:
  - "grep -n 'var damage' game/scripts/core/enemy_controller.gd"
  - "grep -n '_apply_damage_to_player' game/scenes/combat/combat_arena.gd"
  - "bash scripts/ci/headless_tests.sh 2>&1 | grep -E 'PASS.*enemy_damage|enemy_damage.*PASS'"

slices:
