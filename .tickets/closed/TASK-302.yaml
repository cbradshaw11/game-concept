notes: >
  enemies.json has "damage" field on each enemy (e.g. scavenger_grunt: 8).
  EnemyController.tick() sets ATTACK state but never calls anything.
  Need an attack_cooldown timer on EnemyController (e.g. 1.5s) to prevent
  every-frame damage. CombatArena._process loop checks ATTACK state and
  calls _apply_damage_to_player when cooldown expires.
