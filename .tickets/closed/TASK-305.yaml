notes: >
  Use a countdown timer in PlayerController._physics_process: if dodge_iframes_active,
  decrement dodge_iframe_timer by delta * 1000 (ms). When <= 0, set inactive.
  try_dodge() sets dodge_iframe_timer = 220.0 (ms from global_combat).
  CombatArena._apply_damage_to_player checks player.dodge_iframes_active first.
