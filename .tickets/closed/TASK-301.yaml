notes: >
  GameState.player_died signal and main._on_player_died() already exist and are
  wired. GameState.die_in_run() also exists. The missing piece is triggering this
  chain from real HP depletion rather than the manual die_pressed button.
  CombatArena needs a new player_died signal connected in _ensure_combat_arena().
