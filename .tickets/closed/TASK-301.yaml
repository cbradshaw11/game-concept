id: TASK-301
title: Player HP and death state
type: feature
priority: p1
area: combat
risk: medium
milestone: M3 Combat Model
status: done

problem: >
  PlayerController has no health variable. Players cannot die from enemy attacks.
  The game cannot be lost, making combat meaningless.

desired_outcome: >
  PlayerController tracks current and max HP. Taking damage reduces HP. At 0,
  a player_died signal chain fires, GameState.die_in_run() clears unbanked
  rewards, and the death flow in main.gd/FlowUI activates.

scope_in:
  - Add current_health and max_health to PlayerController, initialized from weapons.json global_combat.max_health
  - Add take_damage(amount) method that emits health_depleted when HP reaches 0
  - Add health_changed(current, max_hp) signal to PlayerController
  - Add player_died signal to CombatArena; emit when player.health_depleted fires
  - Connect combat_arena.player_died in main._ensure_combat_arena() to trigger die flow
  - main._on_combat_player_died() mirrors _on_die_pressed logic (GameState.die_in_run, contract fail, save)

scope_out:
  - Combat HUD display (TASK-307)
  - Enemy damage wiring to player (TASK-302)
  - Guard or dodge damage modifiers (TASK-304, TASK-305)
  - Poise system (TASK-306)

dependencies:
  blockers: []
  unblocks:
    - TASK-302
    - TASK-304
    - TASK-305
    - TASK-306
    - TASK-307
    - TASK-308

acceptance_criteria:
  - id: ac1
    description: PlayerController has current_health and max_health initialized from weapons.json global_combat.max_health (100)
    verify: "grep -n 'current_health\\|max_health' game/scripts/core/player_controller.gd"
  - id: ac2
    description: take_damage(amount) reduces health and emits health_depleted at 0
    verify: "grep -n 'take_damage\\|health_depleted' game/scripts/core/player_controller.gd"
  - id: ac3
    description: CombatArena emits player_died signal when player health depletes
    verify: "grep -n 'player_died' game/scenes/combat/combat_arena.gd"
  - id: ac4
    description: main.gd connects combat_arena.player_died and handles death flow
    verify: "grep -n 'player_died\\|_on_combat_player_died' game/scripts/main.gd"
  - id: ac5
    description: Unit test passes — two damage events summing to > max_health fire player_died
    verify: "bash scripts/ci/headless_tests.sh 2>&1 | grep -E 'PASS.*player_hp|player_hp.*PASS'"

verification_required:
  - "grep -n 'current_health\\|max_health' game/scripts/core/player_controller.gd"
  - "grep -n 'take_damage\\|health_depleted' game/scripts/core/player_controller.gd"
  - "grep -n 'player_died' game/scenes/combat/combat_arena.gd"
  - "grep -n 'player_died\\|_on_combat_player_died' game/scripts/main.gd"
  - "bash scripts/ci/headless_tests.sh 2>&1 | grep -E 'PASS.*player_hp|player_hp.*PASS'"

