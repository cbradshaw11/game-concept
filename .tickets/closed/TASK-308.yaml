notes: >
  main.gd already calls flow_ui.on_died(GameState.unbanked_xp, GameState.unbanked_loot).
  Extend the signature to include ring and encounters_cleared, or read them from
  GameState directly. Add a death_panel Control node to flow_ui.tscn with Labels
  for each stat and a ReturnButton. on_died() shows the panel and populates labels.
  Return button calls on_idle_ready() to reset to prep state.
